<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>REVIVE — distributed inference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --bg-1: #111111;
    --bg-2: #161616;
    --bg-3: #1c1c1c;
    --line: #1f1f1f;
    --line-strong: #2a2a2a;
    --text: #e6e6e6;
    --text-dim: #808080;
    --text-subtle: #4a4a4a;
    --text-faint: #2e2e2e;
    --accent: #00ff88;
    --accent-dim: #00c96d;
    --accent-alpha: rgba(0,255,136,0.1);
    --arduino: #f5a623;
    --arduino-alpha: rgba(245,166,35,0.1);
    --user: #6ea8fe;
    --user-alpha: rgba(110,168,254,0.08);
    --err: #ff5d5d;
    --warn: #ffb347;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13.5px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  ::selection { background: var(--accent); color: #000; }

  /* ───── Top bar ─────────────────────────────────────────────────────── */
  .topbar {
    display: flex; align-items: center; gap: 18px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--line);
    background: rgba(8,8,8,0.92);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
    height: 44px;
  }
  .logo {
    font-family: var(--mono);
    font-weight: 800;
    letter-spacing: 4px;
    color: var(--accent);
    font-size: 13px;
  }
  .divider { width: 1px; height: 18px; background: var(--line-strong); }
  .stat-chip {
    display: flex; align-items: baseline; gap: 6px;
    font-family: var(--mono); font-size: 11px;
  }
  .stat-chip .k { color: var(--text-subtle); text-transform: uppercase; letter-spacing: 1.2px; font-size: 9px; }
  .stat-chip .v { color: var(--text); font-weight: 600; }
  .pill {
    padding: 3px 10px; border-radius: 999px;
    font-family: var(--mono); font-size: 10px;
    font-weight: 700; letter-spacing: 1.2px;
    border: 1px solid transparent;
  }
  .pill.healthy { background: var(--accent-alpha); color: var(--accent); border-color: rgba(0,255,136,0.25); }
  .pill.degraded { background: rgba(255,179,71,0.12); color: var(--warn); border-color: rgba(255,179,71,0.3); }
  .pill.down { background: rgba(255,93,93,0.12); color: var(--err); border-color: rgba(255,93,93,0.3); }
  .pill.disconnected { background: var(--bg-2); color: var(--text-subtle); border-color: var(--line); }

  .bmc-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 999px;
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    letter-spacing: 1px; color: var(--text-dim);
    border: 1px solid var(--line);
    background: var(--bg-2);
    cursor: default;
  }
  .bmc-badge.arduino { color: var(--arduino); border-color: rgba(245,166,35,0.35); background: var(--arduino-alpha); }
  .bmc-badge .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-subtle);
  }
  .bmc-badge.arduino .dot { background: var(--arduino); box-shadow: 0 0 8px var(--arduino); animation: breathe 2.4s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-faint); margin-left: auto; transition: background .25s; }
  .conn-dot.live { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: breathe 3s ease-in-out infinite; }

  /* ───── Main 3-column layout ─────────────────────────────────────────── */
  .main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  /* Left: chats sidebar */
  .sidebar {
    width: 240px; flex-shrink: 0;
    display: flex; flex-direction: column;
    border-right: 1px solid var(--line);
    background: var(--bg);
  }
  .sidebar-header {
    padding: 14px 14px 10px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--line);
  }
  .sb-title { font-family: var(--mono); font-size: 9px; color: var(--text-subtle); letter-spacing: 2px; text-transform: uppercase; }
  .btn-new {
    margin-left: auto;
    background: var(--accent); color: #000; border: none;
    border-radius: 6px; padding: 5px 10px;
    font-family: var(--mono); font-weight: 700; font-size: 11px;
    cursor: pointer; transition: opacity .15s, transform .05s;
    letter-spacing: 0.3px;
  }
  .btn-new:hover { opacity: 0.9; }
  .btn-new:active { transform: translateY(1px); }

  .chat-list { flex: 1; overflow-y: auto; padding: 6px; }
  .chat-list::-webkit-scrollbar { width: 4px; }
  .chat-list::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 2px; }
  .chat-row {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 10px; margin: 2px 0;
    border-radius: 7px; cursor: pointer;
    transition: background .12s;
    position: relative;
  }
  .chat-row:hover { background: var(--bg-2); }
  .chat-row.active { background: var(--bg-3); }
  .chat-row.active::before {
    content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
    width: 2px; background: var(--accent); border-radius: 1px;
  }
  .chat-title {
    flex: 1; font-size: 12.5px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-weight: 500;
  }
  .chat-row.active .chat-title { color: var(--accent); }
  .chat-meta { font-family: var(--mono); font-size: 9px; color: var(--text-subtle); letter-spacing: 0.5px; }
  .chat-del {
    display: none; background: transparent; border: 0; color: var(--text-subtle);
    padding: 2px 6px; cursor: pointer; border-radius: 4px; font-size: 14px;
    line-height: 1;
  }
  .chat-row:hover .chat-del { display: inline-block; }
  .chat-del:hover { color: var(--err); background: rgba(255,93,93,0.08); }

  /* Center: chat pane */
  .chatpane {
    flex: 1; display: flex; flex-direction: column;
    min-width: 0; overflow: hidden;
    background: var(--bg);
  }
  .chatpane-header {
    padding: 10px 20px 10px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .chat-h-title { font-family: var(--mono); font-size: 11px; color: var(--text); font-weight: 500; letter-spacing: 0.5px;
                  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%; }
  .chat-h-model { margin-left: auto; font-family: var(--mono); font-size: 9px; color: var(--text-subtle); letter-spacing: 1px; }

  .msgs { flex: 1; overflow-y: auto; padding: 28px 32px 12px; scroll-behavior: smooth; }
  .msgs::-webkit-scrollbar { width: 4px; }
  .msgs::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 2px; }

  .empty-state {
    height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; pointer-events: none;
  }
  .empty-icon {
    font-size: 42px; opacity: 0.15;
    font-family: var(--mono); letter-spacing: 8px; color: var(--accent);
  }
  .empty-text { font-family: var(--mono); font-size: 11px; letter-spacing: 2px; color: var(--text-faint); text-transform: uppercase; }
  .empty-hint { font-size: 12px; color: var(--text-subtle); max-width: 340px; text-align: center; line-height: 1.6; }

  .turn { margin-bottom: 28px; animation: fade-in .28s ease-out; }
  @keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .msg-user {
    display: flex; justify-content: flex-end; margin-bottom: 14px;
  }
  .bubble-user {
    background: var(--user-alpha);
    border: 1px solid rgba(110,168,254,0.25);
    color: var(--text);
    padding: 11px 15px;
    border-radius: 14px 14px 4px 14px;
    max-width: 70%;
    line-height: 1.55;
    font-size: 13.5px;
    word-wrap: break-word;
  }

  .msg-asst { display: flex; flex-direction: column; gap: 10px; }
  .asst-header {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-subtle); letter-spacing: 1.2px;
    text-transform: uppercase;
  }
  .asst-header .label { color: var(--accent); font-weight: 700; }
  .asst-header .sep { color: var(--text-faint); }
  .asst-header .tag {
    padding: 1px 8px; border-radius: 4px;
    background: var(--bg-2); color: var(--text-dim);
    font-size: 9px; letter-spacing: 1.3px;
  }
  .asst-header .tag.live { color: var(--accent); background: var(--accent-alpha); }
  .asst-header .tag.live::after { content: '●'; margin-left: 5px; animation: breathe 1.2s ease-in-out infinite; }

  .answer-box {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 18px;
    line-height: 1.6;
    font-size: 15px;
    font-weight: 500;
    color: #ffffff;
    white-space: pre-wrap;
    word-break: break-word;
    position: relative;
  }
  .answer-box.streaming { border-color: rgba(0,255,136,0.25); }
  .answer-box.streaming::after {
    content: ''; display: inline-block; width: 6px; height: 14px;
    background: var(--accent);
    margin-left: 2px; vertical-align: text-bottom;
    animation: caret 1s steps(2) infinite;
  }
  @keyframes caret { 50% { opacity: 0; } }

  /* Markdown styling inside the answer block. */
  .answer-box p { margin: 0 0 10px 0; }
  .answer-box p:last-child { margin-bottom: 0; }
  .answer-box h1, .answer-box h2, .answer-box h3,
  .answer-box h4, .answer-box h5, .answer-box h6 {
    margin: 14px 0 6px 0; font-weight: 700; color: #ffffff;
    letter-spacing: 0.3px;
  }
  .answer-box h1 { font-size: 20px; }
  .answer-box h2 { font-size: 17px; }
  .answer-box h3 { font-size: 15px; }
  .answer-box h4, .answer-box h5, .answer-box h6 { font-size: 14px; color: var(--text-dim); }
  .answer-box h1:first-child, .answer-box h2:first-child, .answer-box h3:first-child { margin-top: 0; }
  .answer-box strong { font-weight: 700; color: #ffffff; }
  .answer-box em { font-style: italic; }
  .answer-box ul, .answer-box ol { margin: 6px 0 10px 0; padding-left: 22px; }
  .answer-box li { margin: 3px 0; }
  .answer-box a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
  .answer-box a:hover { opacity: 0.85; }
  .answer-box code {
    font-family: var(--mono);
    font-size: 0.88em;
    padding: 1px 5px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--line);
    border-radius: 4px;
  }
  .answer-box pre {
    margin: 8px 0;
    padding: 10px 12px;
    background: #060606;
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow-x: auto;
  }
  .answer-box pre code {
    background: transparent; border: none; padding: 0;
    font-size: 12.5px; line-height: 1.5;
  }
  .answer-box.aborted {
    border-color: rgba(255,93,93,0.3);
    background: rgba(255,93,93,0.05);
  }
  .abort-note { margin-top: 10px; color: var(--err); font-size: 11.5px; font-family: var(--mono); }

  .raw-expand {
    margin-top: 2px; display: flex; align-items: center; gap: 6px;
    color: var(--text-subtle); font-family: var(--mono); font-size: 10px;
    cursor: pointer; user-select: none; letter-spacing: 0.8px;
    padding: 4px 0; width: fit-content;
  }
  .raw-expand:hover { color: var(--text-dim); }
  .raw-expand .arrow { transition: transform .2s; }
  .raw-expand.open .arrow { transform: rotate(90deg); }
  .raw-panel {
    display: none;
    margin-top: 8px;
    background: #060606;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: var(--mono); font-size: 11.5px;
    color: var(--text-dim); line-height: 1.55;
    white-space: pre-wrap; word-break: break-word;
  }
  .raw-expand.open + .raw-panel { display: block; }

  /* Per-stage latency bar */
  .stage-bar {
    display: flex; gap: 2px; height: 6px;
    border-radius: 3px; overflow: hidden;
    background: var(--bg-2);
  }
  .stage-bar .seg { transition: flex .4s; }
  .stage-legend {
    display: flex; gap: 12px; flex-wrap: wrap;
    font-family: var(--mono); font-size: 9.5px; color: var(--text-subtle);
    letter-spacing: 0.5px;
  }
  .stage-legend .leg { display: flex; align-items: center; gap: 5px; }
  .stage-legend .leg .dot { width: 7px; height: 7px; border-radius: 2px; }
  .stage-legend .leg .v { color: var(--text-dim); }

  /* Input bar */
  .inputbar {
    padding: 14px 22px 18px;
    border-top: 1px solid var(--line);
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--bg);
    flex-shrink: 0;
  }
  .input-wrapper {
    flex: 1; position: relative;
    background: var(--bg-2);
    border: 1px solid var(--line-strong);
    border-radius: 12px;
    transition: border-color .18s, background .18s;
  }
  .input-wrapper:focus-within {
    border-color: rgba(0,255,136,0.4);
    background: var(--bg-1);
  }
  .input-wrapper textarea {
    width: 100%; border: 0; outline: 0;
    background: transparent; color: var(--text);
    font-family: var(--sans); font-size: 14px;
    padding: 13px 16px; resize: none;
    line-height: 1.5; min-height: 46px; max-height: 200px;
  }
  .input-wrapper textarea::placeholder { color: var(--text-subtle); }
  .btn-send {
    background: var(--accent); color: #000;
    border: 0; border-radius: 10px;
    padding: 0 22px; height: 46px;
    font-family: var(--mono); font-weight: 800; font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity .15s, transform .05s;
  }
  .btn-send:hover:not(:disabled) { opacity: 0.92; }
  .btn-send:active:not(:disabled) { transform: translateY(1px); }
  .btn-send:disabled { background: var(--line-strong); color: var(--text-subtle); cursor: not-allowed; }

  .busy-spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid var(--bg-3); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite;
    margin-right: 6px; vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Right: monitor panel */
  .monitor {
    width: 340px; flex-shrink: 0;
    display: flex; flex-direction: column;
    border-left: 1px solid var(--line);
    background: #080808;
    overflow-y: auto;
  }
  .monitor::-webkit-scrollbar { width: 4px; }
  .monitor::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 2px; }
  .mon-section { padding: 14px 16px; border-bottom: 1px solid var(--line); }
  .mon-section:last-child { border-bottom: 0; }
  .mon-title {
    font-family: var(--mono); font-size: 9px; color: var(--text-subtle);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;
  }

  /* Layer strip */
  .layer-strip {
    display: flex; width: 100%; height: 22px;
    border-radius: 4px; overflow: hidden;
    background: var(--bg-2); border: 1px solid var(--line);
  }
  .layer-cell { flex: 1; height: 100%; position: relative; transition: filter .15s; }
  .layer-cell.active-pulse { animation: pulse-cell .6s ease-out; }
  @keyframes pulse-cell {
    0% { filter: brightness(1.8); }
    100% { filter: brightness(1); }
  }

  /* Worker cards */
  .w-cards { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .w-card {
    background: var(--bg-1); border: 1px solid var(--line);
    border-radius: 8px; padding: 11px 12px;
    transition: border-color .2s;
  }
  .w-card.has-layers { border-color: rgba(0,255,136,0.2); }
  .w-card.dead { opacity: 0.4; border-color: rgba(255,93,93,0.3); }
  .w-card-head { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
  .w-card-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); }
  .w-card.has-layers .w-card-dot { box-shadow: 0 0 6px currentColor; }
  .w-card-name { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }
  .w-card-addr { font-family: var(--mono); font-size: 9px; color: var(--text-subtle); margin-left: auto; }
  .w-card-range { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 0.3px; }
  .w-card-bar { height: 3px; background: var(--bg-3); border-radius: 2px; overflow: hidden; }
  .w-card-bar .fill { height: 100%; transition: width .5s; }
  .w-card-btns { display: flex; gap: 5px; margin-top: 8px; }
  .w-card-btns button {
    flex: 1; padding: 3px 0; border-radius: 4px; cursor: pointer;
    background: transparent; border: 1px solid var(--line-strong);
    font-family: var(--mono); font-size: 9px; color: var(--text-subtle);
    letter-spacing: 1px; transition: all .12s;
  }
  .w-card-btns button:hover { color: var(--err); border-color: rgba(255,93,93,0.35); }
  .w-card-btns .heal:hover { color: var(--accent); border-color: rgba(0,255,136,0.35); }

  /* BMC event log */
  .evt-log { max-height: 200px; overflow-y: auto; font-family: var(--mono); font-size: 10px; line-height: 1.5; }
  .evt-log::-webkit-scrollbar { width: 3px; }
  .evt-log::-webkit-scrollbar-thumb { background: var(--line-strong); }
  .evt { display: flex; gap: 6px; padding: 1px 0; }
  .evt .arr { color: var(--text-faint); flex-shrink: 0; }
  .evt .arr.out { color: var(--user); }
  .evt .arr.in { color: var(--accent); }
  .evt .ln { color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .evt .ln.ack { color: var(--text-faint); }
  .evt .ln.dead, .evt .ln.fail { color: var(--err); }
  .evt .ln.alive { color: var(--accent); }
  .evt .ln.partition { color: var(--arduino); }
  .evt .ln.leader { color: var(--accent); font-weight: 600; }

  /* QR panel */
  .qr-row { display: flex; gap: 12px; align-items: flex-start; }
  .qr-box { background: #fff; padding: 5px; border-radius: 5px; flex-shrink: 0; }
  .qr-box img, .qr-box canvas { display: block; width: 88px; height: 88px; }
  .qr-body { flex: 1; min-width: 0; }
  .qr-url {
    font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 500;
    word-break: break-all; line-height: 1.4; cursor: pointer;
  }
  .qr-hint { font-family: var(--mono); font-size: 9px; color: var(--text-subtle); letter-spacing: 0.5px; margin-top: 4px; }

  /* BMC HA replicas */
  .replicas { display: flex; flex-direction: column; gap: 4px; }
  .rep {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 8px; border-radius: 5px;
    background: var(--bg-1); border: 1px solid var(--line);
    font-family: var(--mono); font-size: 10px;
  }
  .rep.leader { border-color: rgba(0,255,136,0.35); background: var(--accent-alpha); }
  .rep.dead { opacity: 0.35; }
  .rep-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-faint); }
  .rep.leader .rep-dot { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
  .rep.dead .rep-dot { background: var(--err); }
  .rep-name { font-weight: 700; letter-spacing: 0.5px; }
  .rep-tag { margin-left: auto; padding: 1px 6px; border-radius: 3px; font-size: 8px; letter-spacing: 1.2px;
             background: var(--accent-alpha); color: var(--accent); font-weight: 700; }

  @media (max-width: 900px) {
    .monitor { width: 260px; }
    .sidebar { width: 180px; }
  }
</style>
</head>
<body>

<!-- ───── Top bar ─────────────────────────────────────────────────────── -->
<div class="topbar">
  <span class="logo">REVIVE</span>
  <span class="divider"></span>
  <div class="stat-chip"><span class="k">nodes</span><span class="v" id="stat-nodes">0</span></div>
  <div class="stat-chip"><span class="k">layers</span><span class="v" id="stat-layers">0</span></div>
  <div class="stat-chip"><span class="k">tokens</span><span class="v" id="stat-tokens">0</span></div>
  <div class="stat-chip"><span class="k">tok/s</span><span class="v" id="stat-tps">0.0</span></div>
  <div style="flex:1"></div>
  <div class="bmc-badge" id="bmc-badge"><span class="dot"></span><span id="bmc-src">—</span></div>
  <div class="pill disconnected" id="state-pill">DISCONNECTED</div>
  <div class="conn-dot" id="conn"></div>
</div>

<!-- ───── Main layout ─────────────────────────────────────────────────── -->
<div class="main">

  <!-- Left sidebar: chats -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sb-title">Chats</span>
      <button class="btn-new" onclick="newChat()">+ NEW</button>
    </div>
    <div class="chat-list" id="chats"></div>
  </div>

  <!-- Center: chat pane -->
  <div class="chatpane">
    <div class="chatpane-header">
      <span class="chat-h-title" id="chat-h-title">—</span>
      <span class="chat-h-model" id="chat-h-model">—</span>
    </div>

    <div class="msgs" id="msgs">
      <!-- populated by render() -->
    </div>

    <div class="inputbar">
      <div class="input-wrapper">
        <textarea id="qin" rows="1" placeholder="Ask the cluster…"
                  oninput="autosize(this)"
                  onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();send()}"></textarea>
      </div>
      <button class="btn-send" id="sbtn" onclick="send()">SEND</button>
    </div>
  </div>

  <!-- Right: system monitor -->
  <div class="monitor">

    <div class="mon-section">
      <div class="mon-title">Layer Partition</div>
      <div class="layer-strip" id="layer-strip"></div>
      <div class="stage-legend" id="layer-legend" style="margin-top:8px"></div>
    </div>

    <div class="mon-section">
      <div class="mon-title">Compute Nodes</div>
      <div class="w-cards" id="workers"></div>
    </div>

    <div class="mon-section" id="ha-sect" style="display:none">
      <div class="mon-title">BMC Replicas (HA)</div>
      <div class="replicas" id="replicas"></div>
    </div>

    <div class="mon-section">
      <div class="mon-title">BMC Wire (Arduino ↔ Host)</div>
      <div class="evt-log" id="evt-log"></div>
    </div>

    <div class="mon-section">
      <div class="mon-title">Connect a Device</div>
      <div class="qr-row">
        <div class="qr-box" id="qr"></div>
        <div class="qr-body">
          <div class="qr-url" id="conn-url" onclick="copyUrl()">—</div>
          <div class="qr-hint">scan on any phone/iPad on the same LAN</div>
          <div class="qr-hint" id="copy-toast" style="color:var(--accent); margin-top:6px; opacity:0; transition:opacity .2s"></div>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
// ─── config / state ──────────────────────────────────────────────────────
const WORKER_COLORS = ['#00ff88','#6ea8fe','#f5a623','#c17bff','#ff8080','#2ecc71','#ffd66b','#8bd9a8'];
let state = null;
let qrUrl = null;

// innerHTML assignment tears down child DOM and triggers paint even when the
// output string is identical. At 30 broadcasts/sec during streaming that's
// what caused the chat pane to shutter black. Memoize per element.
function setHTMLIfChanged(el, html) {
  if (el._lastHtml === html) return;
  el._lastHtml = html;
  el.innerHTML = html;
}

// Minimal markdown renderer for LLM output. Escapes HTML first, then applies
// a safe subset: headers, bold, italic, inline/block code, ordered+unordered
// lists, autolinks. Single-paragraph content stays inline so the streaming
// caret sits right after the last character rather than dropping to a new line.
function renderMarkdown(raw) {
  if (!raw) return '';
  let s = String(raw).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Fenced code blocks first so their contents aren't mangled by later rules.
  s = s.replace(/```([a-zA-Z0-9_-]*)\n?([\s\S]*?)```/g,
    (_, _lang, code) => `<pre><code>${code.replace(/\n$/, '')}</code></pre>`);

  // Headers (line start)
  s = s.replace(/^###### (.+)$/gm, '<h6>$1</h6>')
       .replace(/^##### (.+)$/gm, '<h5>$1</h5>')
       .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
       .replace(/^### (.+)$/gm, '<h3>$1</h3>')
       .replace(/^## (.+)$/gm, '<h2>$1</h2>')
       .replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Inline code
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');

  // Bold, then italic. Non-greedy and no-newline so unclosed markers during
  // streaming fall through as literal text instead of swallowing the rest.
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
       .replace(/(^|[\s(])\*([^*\n]+)\*/g, '$1<em>$2</em>')
       .replace(/(^|[\s(])_([^_\n]+)_/g, '$1<em>$2</em>');

  // Markdown links — only http(s) allowed, opens in new tab.
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Unordered lists
  s = s.replace(/(^(?:[-*] .+\n?)+)/gm, block => {
    const items = block.trim().split('\n')
      .map(l => `<li>${l.replace(/^[-*] /, '')}</li>`).join('');
    return `<ul>${items}</ul>`;
  });
  // Ordered lists
  s = s.replace(/(^(?:\d+\. .+\n?)+)/gm, block => {
    const items = block.trim().split('\n')
      .map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
    return `<ol>${items}</ol>`;
  });

  // Paragraphs. Single-paragraph output stays unwrapped so the streaming
  // caret sits inline at the end of the text.
  const blocks = s.split(/\n\n+/).map(b => b.trim()).filter(Boolean);
  const isBlock = t => /^<(h[1-6]|ul|ol|pre|blockquote)/i.test(t);
  if (blocks.length === 1 && !isBlock(blocks[0])) {
    s = blocks[0].replace(/\n/g, '<br>');
  } else {
    s = blocks.map(t => isBlock(t) ? t : `<p>${t.replace(/\n/g, '<br>')}</p>`).join('');
  }
  return s;
}
let lastLeader = null;
let layerCells = [];         // DOM refs for pulse animation

// ─── SSE ─────────────────────────────────────────────────────────────────
function connect() {
  const es = new EventSource('/events');
  const dot = document.getElementById('conn');
  es.onopen = () => { dot.classList.add('live'); lastLeader = null; };
  es.onerror = () => { dot.classList.remove('live'); setTimeout(connect, 2000); };
  es.onmessage = e => {
    state = JSON.parse(e.data);
    render();
  };
}
connect();

// ─── color helper ────────────────────────────────────────────────────────
function colorFor(workerId, workers) {
  const i = workers.findIndex(w => w.id === workerId);
  return WORKER_COLORS[i % WORKER_COLORS.length] || '#00ff88';
}

// ─── render ──────────────────────────────────────────────────────────────
function render() {
  if (!state) return;

  renderTopbar();
  renderChats();
  renderMessages();
  renderMonitor();
  renderQR();
  renderHA();
}

function renderTopbar() {
  document.getElementById('stat-nodes').textContent = state.workers.length;
  document.getElementById('stat-layers').textContent = state.num_layers || 0;
  document.getElementById('stat-tokens').textContent = fmtInt(state.total_tokens);
  document.getElementById('stat-tps').textContent = (state.collective_tps || 0).toFixed(1);

  const pill = document.getElementById('state-pill');
  const s = state.bmc?.state || 'disconnected';
  pill.textContent = s.toUpperCase();
  pill.className = 'pill ' + s;

  const bmcSrc = state.bmc_source || '';
  const badge = document.getElementById('bmc-badge');
  const label = document.getElementById('bmc-src');
  if (bmcSrc.startsWith('arduino:')) {
    badge.classList.add('arduino');
    label.textContent = 'ARDUINO ' + bmcSrc.split('/').pop();
  } else if (bmcSrc.startsWith('simulator')) {
    badge.classList.remove('arduino');
    label.textContent = 'SIMULATOR';
  } else {
    badge.classList.remove('arduino');
    label.textContent = bmcSrc || '—';
  }

  // Chat header
  const active = activeChat();
  document.getElementById('chat-h-title').textContent = active ? active.title : '—';
  document.getElementById('chat-h-model').textContent = (state.model || '').split('/').pop();
}

function renderChats() {
  const el = document.getElementById('chats');
  const active = state.active_chat_id;
  const html = (state.chats || []).map(c => {
    const isActive = c.id === active;
    return `<div class="chat-row ${isActive?'active':''}" onclick="activateChat('${c.id}')">
      <div style="flex:1; overflow:hidden">
        <div class="chat-title">${esc(c.title)}</div>
        <div class="chat-meta">${c.message_count} msg · ${relTime(c.updated_at)}</div>
      </div>
      <button class="chat-del" title="Delete"
              onclick="event.stopPropagation(); deleteChat('${c.id}')">✕</button>
    </div>`;
  }).join('');
  setHTMLIfChanged(el, html);
}

function activeChat() {
  if (!state) return null;
  return (state.chats || []).find(c => c.id === state.active_chat_id) || null;
}

// Incremental rendering — we never blow away the whole message list on
// each SSE tick. The full-innerHTML approach was causing a visible flicker
// every ~33ms as tokens streamed. Instead we keep a DOM registry per qid
// and only write the parts that actually changed.
const turnNodes = {};   // qid → { root, userBubble, asstWrap, header, stageBar, legend, body, abort, rawExpand, rawPanel }
let lastChatId = null;
let lastEmptyShown = false;

function renderMessages() {
  const el = document.getElementById('msgs');
  const msgs = state.messages || [];

  // Chat switched — wipe and re-seed
  if (state.active_chat_id !== lastChatId) {
    el.innerHTML = '';
    for (const k of Object.keys(turnNodes)) delete turnNodes[k];
    lastChatId = state.active_chat_id;
    lastEmptyShown = false;
  }

  if (msgs.length === 0) {
    if (!lastEmptyShown) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">◆ ◆ ◆</div>
          <div class="empty-text">Ready</div>
          <div class="empty-hint">
            Ask anything. Inference splits across ${state.workers.length} node${state.workers.length===1?'':'s'} —
            hidden states flow through the ring, the final answer streams back here in real time.
          </div>
        </div>`;
      lastEmptyShown = true;
    }
    document.getElementById('sbtn').disabled = !!state.busy;
    document.getElementById('sbtn').textContent = state.busy ? 'RUNNING' : 'SEND';
    return;
  }
  if (lastEmptyShown) {
    el.innerHTML = '';
    lastEmptyShown = false;
  }

  // Group messages by qid, maintaining creation order
  const qidOrder = [];
  const turns = {};
  for (const m of msgs) {
    if (!turns[m.qid]) { turns[m.qid] = { user: null, asst: null }; qidOrder.push(m.qid); }
    if (m.role === 'user') turns[m.qid].user = m;
    else turns[m.qid].asst = m;
  }

  // Remove stale qids (e.g. from previous chats)
  for (const qid of Object.keys(turnNodes)) {
    if (!turns[qid]) {
      turnNodes[qid].root.remove();
      delete turnNodes[qid];
    }
  }

  // Create or update each turn
  for (const qid of qidOrder) {
    const t = turns[qid];
    let node = turnNodes[qid];
    if (!node) {
      node = createTurnNode(qid);
      turnNodes[qid] = node;
      el.appendChild(node.root);
    }
    updateTurnNode(node, t);
  }

  // Autoscroll only when near bottom (don't fight the user scrolling up)
  const nearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
  if (nearBottom) el.scrollTop = el.scrollHeight;

  document.getElementById('sbtn').disabled = !!state.busy;
  document.getElementById('sbtn').textContent = state.busy ? 'RUNNING' : 'SEND';
}

function createTurnNode(qid) {
  const root = document.createElement('div');
  root.className = 'turn';
  root.dataset.qid = qid;

  const userWrap = document.createElement('div');
  userWrap.className = 'msg-user';
  userWrap.style.display = 'none';
  const userBubble = document.createElement('div');
  userBubble.className = 'bubble-user';
  userWrap.appendChild(userBubble);

  const asstWrap = document.createElement('div');
  asstWrap.className = 'msg-asst';
  asstWrap.style.display = 'none';

  const header = document.createElement('div');
  header.className = 'asst-header';

  const stageBar = document.createElement('div');
  stageBar.className = 'stage-bar';
  stageBar.style.display = 'none';

  const legend = document.createElement('div');
  legend.className = 'stage-legend';
  legend.style.marginTop = '6px';
  legend.style.display = 'none';

  const body = document.createElement('div');
  body.className = 'answer-box';

  const abort = document.createElement('div');
  abort.className = 'abort-note';
  abort.style.display = 'none';

  const rawExpand = document.createElement('div');
  rawExpand.className = 'raw-expand';
  rawExpand.style.display = 'none';
  rawExpand.innerHTML = '<span class="arrow">▶</span> show raw stream';
  rawExpand.addEventListener('click', () => rawExpand.classList.toggle('open'));

  const rawPanel = document.createElement('div');
  rawPanel.className = 'raw-panel';

  asstWrap.appendChild(header);
  asstWrap.appendChild(stageBar);
  asstWrap.appendChild(legend);
  asstWrap.appendChild(body);
  asstWrap.appendChild(abort);
  asstWrap.appendChild(rawExpand);
  asstWrap.appendChild(rawPanel);

  root.appendChild(userWrap);
  root.appendChild(asstWrap);

  return { root, userWrap, userBubble, asstWrap, header, stageBar, legend, body, abort, rawExpand, rawPanel };
}

function updateTurnNode(n, t) {
  // User bubble
  if (t.user) {
    n.userWrap.style.display = '';
    if (n.userBubble.textContent !== t.user.content) {
      n.userBubble.textContent = t.user.content;
    }
  } else {
    n.userWrap.style.display = 'none';
  }

  // Assistant block
  const a = t.asst;
  if (!a) { n.asstWrap.style.display = 'none'; return; }
  n.asstWrap.style.display = '';

  const streaming = a.streaming === true;
  const aborted = !!a.aborted;
  const tokens = a.tokens || 0;
  const tps = a.tps || 0;
  const stepMs = a.step_latency_ms || 0;

  // Header — only patch if changed
  const headerKey = `${streaming}|${tokens}|${tps.toFixed(1)}|${Math.round(stepMs)}`;
  if (n._headerKey !== headerKey) {
    const parts = [`<span class="label">REVIVE</span>`];
    if (tokens > 0) parts.push(`<span>${tokens} tok</span>`);
    if (tps > 0) parts.push(`<span>${tps.toFixed(1)} tok/s</span>`);
    if (stepMs > 0) parts.push(`<span>${Math.round(stepMs)}ms/step</span>`);
    let h = parts.join(' <span class="sep">·</span> ');
    if (streaming) h += ` <span class="tag live">STREAMING</span>`;
    n.header.innerHTML = h;
    n._headerKey = headerKey;
  }

  // Stage latency bar
  const lats = a.avg_stage_latencies_ms || [];
  const latKey = lats.map(v => v.toFixed(1)).join(',') + '|' + state.workers.length;
  if (n._latKey !== latKey) {
    if (lats.length > 0 && state.workers.length === lats.length) {
      const total = lats.reduce((p, q) => p + q, 0) || 1;
      let segs = '', legs = '';
      lats.forEach((lat, i) => {
        const w = state.workers[i];
        const col = colorFor(w.id, state.workers);
        segs += `<div class="seg" style="flex:${lat};background:${col}"></div>`;
        legs += `<div class="leg"><span class="dot" style="background:${col}"></span>`
             + `<span>${esc(w.id)}</span> <span class="v">${lat.toFixed(1)}ms</span></div>`;
      });
      n.stageBar.innerHTML = segs;
      n.legend.innerHTML = legs;
      n.stageBar.style.display = '';
      n.legend.style.display = '';
    } else {
      n.stageBar.style.display = 'none';
      n.legend.style.display = 'none';
    }
    n._latKey = latKey;
  }

  // Answer body — the hot path during streaming. Markdown-render only when
  // content changes; textContent/innerHTML assignment is what makes the
  // caret jump, so gate it behind a diff.
  const content = a.content || '';
  if (n._body !== content) {
    n.body.innerHTML = renderMarkdown(content);
    n._body = content;
  }
  const cls = ['answer-box'];
  if (streaming) cls.push('streaming');
  if (aborted) cls.push('aborted');
  const clsStr = cls.join(' ');
  if (n.body.className !== clsStr) n.body.className = clsStr;

  // Abort note
  if (aborted) {
    n.abort.style.display = '';
    const reason = a.abort_reason || 'aborted';
    if (n._abortReason !== reason) {
      n.abort.textContent = '⚠ ' + reason;
      n._abortReason = reason;
    }
  } else {
    n.abort.style.display = 'none';
  }

  // Raw-stream expand panel — only show when done and has content
  const hasContent = content && content.trim().length > 0;
  const showRaw = hasContent && !streaming;
  if (n._showRaw !== showRaw) {
    n.rawExpand.style.display = showRaw ? '' : 'none';
    n.rawPanel.style.display = showRaw ? n.rawPanel.style.display : 'none';
    n._showRaw = showRaw;
  }
  if (showRaw && n._rawBody !== content) {
    n.rawPanel.textContent = content;
    n._rawBody = content;
  }
}

function renderMonitor() {
  // Layer strip
  const L = state.num_layers || 0;
  const strip = document.getElementById('layer-strip');
  const partition = state.bmc?.partition || [];

  if (layerCells.length !== L) {
    strip.innerHTML = '';
    layerCells = [];
    for (let i = 0; i < L; i++) {
      const div = document.createElement('div');
      div.className = 'layer-cell';
      strip.appendChild(div);
      layerCells.push(div);
    }
  }

  for (let i = 0; i < L; i++) {
    const owner = partition.find(p => i >= p[1] && i < p[2]);
    if (owner) {
      const col = colorFor(owner[0], state.workers);
      const nextBg = col + 'cc';
      if (layerCells[i]._bg !== nextBg) { layerCells[i].style.background = nextBg; layerCells[i]._bg = nextBg; }
      layerCells[i].title = `layer ${i} · ${owner[0]}`;
    } else {
      if (layerCells[i]._bg !== '#161616') { layerCells[i].style.background = '#161616'; layerCells[i]._bg = '#161616'; }
      layerCells[i].title = `layer ${i} · unassigned`;
    }
  }

  // Layer legend
  const leg = document.getElementById('layer-legend');
  const legHtml = partition.map(p => {
    const col = colorFor(p[0], state.workers);
    return `<div class="leg"><span class="dot" style="background:${col}"></span>`
         + `<span>${esc(p[0])}</span><span class="v">[${p[1]}..${p[2]})</span></div>`;
  }).join('');
  setHTMLIfChanged(leg, legHtml);

  // Workers
  const wHtml = state.workers.map(w => {
    const col = colorFor(w.id, state.workers);
    const owned = partition.find(p => p[0] === w.id);
    const span = owned ? (owned[2] - owned[1]) : 0;
    const pct = L > 0 ? (span / L * 100) : 0;
    const cls = ['w-card'];
    if (span > 0) cls.push('has-layers');
    if (w.dead) cls.push('dead');
    return `<div class="${cls.join(' ')}">
      <div class="w-card-head">
        <span class="w-card-dot" style="background:${col};color:${col}"></span>
        <span class="w-card-name" style="color:${col}">${esc(w.id.toUpperCase())}</span>
        <span class="w-card-addr">${esc(w.host)}:${w.port}</span>
      </div>
      <div class="w-card-range">
        ${owned ? `layers [${owned[1]}..${owned[2]}) · ${span}/${L}` :
                  (w.dead ? '<span style="color:var(--err)">DEAD</span>' : 'unassigned')}
      </div>
      <div class="w-card-bar"><div class="fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="w-card-btns">
        <button onclick="chaos('fail','${w.id}')">KILL</button>
        <button class="heal" onclick="chaos('heal','${w.id}')">HEAL</button>
      </div>
    </div>`;
  }).join('');
  setHTMLIfChanged(document.getElementById('workers'), wHtml);

  // BMC wire
  const evt = document.getElementById('evt-log');
  const evtHtml = (state.bmc_events||[]).slice(-30).map(e => {
    const cls = e.dir === '→' ? 'out' : (e.dir === '**' ? 'meta' : 'in');
    const line = e.line || '';
    const lineCls = line.startsWith('LEADER_CHANGED') ? 'leader' :
                    line.startsWith('ACK ') ? 'ack' :
                    line.startsWith('DEAD') ? 'dead' :
                    line.startsWith('FAIL') ? 'fail' :
                    line.startsWith('ALIVE') ? 'alive' :
                    line.startsWith('PARTITION') ? 'partition' : '';
    return `<div class="evt"><span class="arr ${cls}">${esc(e.dir)}</span><span class="ln ${lineCls}">${esc(line)}</span></div>`;
  }).join('');
  if (evt._lastHtml !== evtHtml) {
    setHTMLIfChanged(evt, evtHtml);
    evt.scrollTop = evt.scrollHeight;
  }
}

function renderHA() {
  const ha = state.bmc_ha;
  const sect = document.getElementById('ha-sect');
  if (!ha) { sect.style.display = 'none'; return; }
  sect.style.display = 'block';
  const repHtml = (ha.replicas||[]).map(r => {
    const cls = ['rep'];
    if (r.is_leader) cls.push('leader');
    if (!r.alive) cls.push('dead');
    const tag = r.is_leader ? `<span class="rep-tag">LEADER</span>` : '';
    return `<div class="${cls.join(' ')}">
      <span class="rep-dot"></span>
      <span class="rep-name">${esc(r.id.toUpperCase())}</span>
      ${tag}
    </div>`;
  }).join('');
  setHTMLIfChanged(document.getElementById('replicas'), repHtml);
}

function renderQR() {
  const url = state.public_url;
  const urlEl = document.getElementById('conn-url');
  urlEl.textContent = url || '—';
  if (url && url !== qrUrl) {
    const el = document.getElementById('qr');
    el.innerHTML = '';
    if (window.QRCode) {
      new QRCode(el, { text: url, width: 88, height: 88, correctLevel: QRCode.CorrectLevel.M });
    }
    qrUrl = url;
  }
}

// ─── actions ─────────────────────────────────────────────────────────────
async function send() {
  const inp = document.getElementById('qin');
  const q = inp.value.trim();
  if (!q || state?.busy) return;
  inp.value = '';
  autosize(inp);
  try {
    await fetch('/query', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ prompt: q, chat_id: state?.active_chat_id, max_tokens: 512 })
    });
  } catch (e) { console.error(e); }
}

async function chaos(action, wid) {
  try {
    await fetch('/chaos/' + action, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ worker_id: wid })
    });
  } catch (e) { console.error(e); }
}

async function newChat() {
  try {
    await fetch('/chats/new', { method: 'POST' });
  } catch (e) { console.error(e); }
}

async function deleteChat(id) {
  try {
    await fetch('/chats/' + id, { method: 'DELETE' });
  } catch (e) { console.error(e); }
}

async function activateChat(id) {
  if (state?.active_chat_id === id) return;
  try {
    await fetch('/chats/' + id + '/activate', { method: 'POST' });
  } catch (e) { console.error(e); }
}

function copyUrl() {
  const u = document.getElementById('conn-url').textContent;
  if (!u) return;
  navigator.clipboard.writeText(u).then(() => {
    const t = document.getElementById('copy-toast');
    t.textContent = 'copied';
    t.style.opacity = 1;
    setTimeout(() => t.style.opacity = 0, 1400);
  });
}

// ─── utils ───────────────────────────────────────────────────────────────
function autosize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fmtInt(n) {
  n = Number(n) || 0;
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return String(n);
}
function relTime(ts) {
  const s = Math.round(Date.now()/1000 - (ts||0));
  if (s < 10) return 'just now';
  if (s < 60) return s + 's';
  if (s < 3600) return Math.round(s/60) + 'm';
  if (s < 86400) return Math.round(s/3600) + 'h';
  return Math.round(s/86400) + 'd';
}
