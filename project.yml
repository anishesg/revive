name: revive
options:
  bundleIdPrefix: com.revive
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  revive:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    info:
      path: revive/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocalNetworkUsageDescription: "REVIVE uses the local network to discover and communicate with worker phones in the swarm."
        NSBonjourServices:
          - "_revive._tcp"
        UIBackgroundModes:
          - audio
          - fetch
        CFBundleDisplayName: "REVIVE"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    entitlements:
      path: revive/revive.entitlements
      properties:
        com.apple.security.app-sandbox: false
    sources:
      - path: revive
        excludes:
          - "**/*.md"
    resources:
      - path: revive/Coordinator/WebDashboard
        buildPhase: resources
      - path: revive/Resources/Qwen3-0.6B-Q4_K_M.gguf
        buildPhase: resources
    frameworks:
      - SDK: Network.framework
      - SDK: Foundation.framework
      - SDK: Metal.framework
      - SDK: Accelerate.framework
    postBuildScripts:
      - name: "Embed llama.framework"
        script: |
          FRAMEWORK_SRC="${PROJECT_DIR}/../llama.cpp/build-apple/llama.xcframework/ios-arm64/llama.framework"
          FRAMEWORK_DST="${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          mkdir -p "${FRAMEWORK_DST}"
          cp -R "${FRAMEWORK_SRC}" "${FRAMEWORK_DST}/"
          codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" --preserve-metadata=identifier,entitlements "${FRAMEWORK_DST}/llama.framework"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anishkataria.revive
        DEVELOPMENT_TEAM: "H6F2UVW5UT"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
        INFOPLIST_FILE: revive/Info.plist
        OTHER_LDFLAGS:
          - "-lc++"
          - "-framework"
          - "llama"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/../llama.cpp/build-apple/llama.xcframework/ios-arm64"
